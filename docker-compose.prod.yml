services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_MOBILE_API_URL: ${VITE_MOBILE_API_URL:-}
    image: spot-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"

  backend:
    build:
      context: ${BACKEND_DIR:-../spot-backend}
      dockerfile: Dockerfile
      target: runner
    image: spot-backend
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  migrate:
    build:
      context: ${BACKEND_DIR:-../spot-backend}
      dockerfile: Dockerfile
      target: migrate
    image: spot-backend-migrate
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  postgres:
    image: postgres:16-alpine
    container_name: spot-postgres
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - spot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  spot_postgres_data:
